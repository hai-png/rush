; C-14 fix: PgBouncer connection pooling configuration for production.
;
; Place this alongside your docker-compose.yml or K8s ConfigMap.
; Run PgBouncer as a sidecar container:
;   docker run -d --name pgbouncer \
;     -v ./pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini \
;     -p 6432:6432 \
;     edoburu/pgbouncer
;
; Then set DATABASE_URL=postgresql://addisride:password@localhost:6432/addisride

[databases]
addisride = host=172.18.0.4 port=5432 dbname=addisride

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Pool settings
pool_mode = transaction
default_pool_size = 25
max_client_conn = 200
max_db_connections = 50

; Timeouts
server_idle_timeout = 600
client_idle_timeout = 0
query_timeout = 30
