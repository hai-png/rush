name: Weekly checks
on:
  schedule: [{ cron: '0 3 * * 1' }] # Monday 03:00 UTC
  workflow_dispatch: {}

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
      - run: k6 run infra/k6/payment-flow.js
        env: { K6_TARGET_URL: https://staging.addisride.et }

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.1.42 }
      - run: bun install --frozen-lockfile
      # FIX (INFRA-001): audit-ci reads package-lock.json by default; point it
      # at the committed bun.lock instead so it actually has something to scan.
      - run: bunx audit-ci --moderate --lockfile-directory=.

  dast:
    runs-on: ubuntu-latest
    steps:
      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with: { target: 'https://staging.addisride.et' }
