name: CI

on:
  push:
    branches: [clean-rebuild, main]
  pull_request:
    branches: [clean-rebuild, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./db/test.db
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run db:push
      - run: bun run db:seed
      - run: |
          bun run dev &
          DEV_PID=$!
          sleep 15
          bash scripts/e2e-test.sh
          kill $DEV_PID
