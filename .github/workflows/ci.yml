name: CI
on:
  pull_request:
  push: { branches: [main] }

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_DB: addisride_test, POSTGRES_USER: test, POSTGRES_PASSWORD: test }
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      # Cache bun install — the previous workflow reinstalled all deps on
      # every run. Now we cache by lockfile hash.
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.1.42 }
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            **/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', '**/package.json') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint + dependency graph check
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Run migrations (test DB)
        run: bun run db:migrate
        env: { DATABASE_URL: postgres://test:test@localhost:5432/addisride_test }

      - name: Unit + integration tests
        run: bun run test --coverage
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/addisride_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          # CI secret — at least 32 chars, mixed case + digits + symbols.
          NEXTAUTH_SECRET: ci-secret-32-chars-or-more-aaaa
          CRON_SECRET: ci-cron-secret-32-chars-or-more-bbbb
          NEXTAUTH_URL: http://localhost:3000
          TELEBIRR_ENV: testbed
          TELEBIRR_NOTIFY_URL: http://localhost:3000/api/v1/webhooks/telebirr/notify
          TELEBIRR_REDIRECT_URL: http://localhost:3000/checkout/complete
          S3_ENDPOINT: http://localhost:9000
          S3_BUCKET: test
          S3_ACCESS_KEY_ID: test
          S3_SECRET_ACCESS_KEY: test

      - name: Enforce coverage gate (80%)
        run: bun run coverage:check

      - name: Build all apps
        run: bun run build

      - name: Generate OpenAPI + SDK, fail on drift
        run: |
          bun run openapi:gen
          bun run sdk:gen
          git diff --exit-code packages/api/openapi.json packages/sdk/src/schema.d.ts

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with: { name: coverage, path: coverage/ }

      # Generate a Software Bill of Materials — required by the incident
      # response plan for knowing exactly which dependency versions are
      # deployed.
      - name: Generate SBOM (CycloneDX)
        run: |
          npx --yes @cyclonedx/cyclonedx-cli \
            --component-name addis-ride \
            --component-version ${GITHUB_SHA::7} \
            --spec-version 1.5 \
            --output-format json \
            --output-file sbom.json
      - uses: actions/upload-artifact@v4
        with: { name: sbom, path: sbom.json }

  e2e-web:
    needs: build-test
    # Run E2E on PRs too, not just main — the previous `if: github.ref ==
    # 'refs/heads/main'` meant PRs could merge with broken E2E.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.1.42 }
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - run: bun run build --filter=web
      - run: bunx playwright test
        env: { E2E_BASE_URL: http://localhost:3000, TELEBIRR_ENV: testbed }

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # FIX (OPS-012): The previous "audit" step had three compounding bugs:
      #   1. `bun pm ls --all --production > /dev/null` lists packages and
      #      discards the output — it does NO audit.
      #   2. `better-npm-audit` reads package-lock.json (npm's lockfile),
      #      but this repo uses bun.lockb — the tool finds nothing to audit.
      #   3. `|| true` and `continue-on-error: true` double-ensured the
      #      step always succeeded. The CI badge was green even if every
      #      dependency had a critical CVE.
      # We now use `osv-scanner` which reads bun.lockb directly and
      # reports known vulnerabilities from the OSV database. The step
      # FAILS on HIGH or CRITICAL severity (no more `|| true`).
      - name: Audit dependencies (production) — fail on HIGH/CRITICAL CVEs
        run: |
          npx --yes @google/osv-scanner --lockfile=bun.lockb --severity=HIGH
      - name: Audit dependencies (all) — warn on MEDIUM
        run: |
          npx --yes @google/osv-scanner --lockfile=bun.lockb --severity=MODERATE
        continue-on-error: true  # medium/low are warnings, not blockers

      - name: Dependency review (on PRs)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Semgrep scan (SAST)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/typescript
            p/react

      - name: Run secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-staging:
    needs: [build-test, e2e-web, security]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel (staging)
        # REAL deploy — the previous step was `echo "vercel deploy ..."`,
        # printing the command but never executing it.
        run: npx --yes vercel deploy --token=$VERCEL_TOKEN --scope=addis-ride --env=staging --yes
        env: { VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }} }
      - name: Upload Sentry release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: addis-ride
          SENTRY_PROJECT: web
        with: { environment: staging }

  deploy-production:
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://addisride.et
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        # REAL deploy — was `echo "vercel deploy ..."` before.
        run: npx --yes vercel deploy --prod --token=$VERCEL_TOKEN --scope=addis-ride --yes
        env: { VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }} }
      - name: Upload Sentry release (production)
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: addis-ride
          SENTRY_PROJECT: web
        with: { environment: production }
