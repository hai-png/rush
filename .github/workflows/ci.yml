# P1-60 / OPS-009 / Sprint 2 #46: CI pipeline.
# Runs lint + typecheck + build + tests on every PR and push to clean-rebuild.
name: CI

on:
  push:
    branches: [clean-rebuild, fix/audit-remediation]
  pull_request:
    branches: [clean-rebuild]

jobs:
  lint-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ci-build-only-secret-32-chars-minimum-length
      CRON_SECRET: ci-build-only-cron-secret-32-chars-minimum
      DATABASE_URL: file:./db/ci.db
      NODE_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate --schema prisma/schema.prisma
      - run: bunx tsc --noEmit
      - run: bunx eslint .

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ci-build-only-secret-32-chars-minimum-length
      CRON_SECRET: ci-build-only-cron-secret-32-chars-minimum
      DATABASE_URL: file:./db/ci-build.db
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate --schema prisma/schema.prisma
      - run: bun run build

  race-tests:
    name: Race-condition integration tests (SQLite)
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ci-test-secret-32-chars-minimum-length
      CRON_SECRET: ci-test-cron-secret-32-chars-minimum
      DATABASE_URL: file:./db/race-test.db
      NODE_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate --schema prisma/schema.prisma
      - run: bun run test:race

  postgres-tests:
    name: Integration tests (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: addisride
          POSTGRES_PASSWORD: ci-test-password
          POSTGRES_DB: addisride
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AUTH_SECRET: ci-pg-test-secret-32-chars-minimum-length
      CRON_SECRET: ci-pg-test-cron-secret-32-chars-minimum
      DATABASE_PROVIDER: postgres
      DATABASE_URL: postgresql://addisride:ci-test-password@localhost:5432/addisride
      NODE_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Generate Prisma client for Postgres schema
        run: bunx prisma generate --schema prisma/schema.postgres.prisma
      - name: Push Postgres schema
        run: bunx prisma db push --skip-generate --schema prisma/schema.postgres.prisma
      - name: Run integration tests against Postgres
        run: bun run test:race

  e2e-tests:
    name: End-to-end tests
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: e2e-test-auth-secret-32-chars-minimum-length
      CRON_SECRET: e2e-test-cron-secret-32-chars-minimum
      DATABASE_URL: file:./db/custom.db
      NODE_ENV: development
      # CI fix: the e2e script requires OTP_DEBUG=1 to return dev codes in
      # API responses (so the test can verify OTP/password-reset flows without
      # receiving real SMS). RATE_LIMIT_DISABLED=1 prevents rate-limit failures
      # during rapid test runs.
      OTP_DEBUG: "1"
      RATE_LIMIT_DISABLED: "1"
      # CI fix: use mock Telebirr for e2e (no real payment creds in CI).
      TELEBIRR_ENV: mock
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate --schema prisma/schema.prisma
      - run: bunx prisma db push --skip-generate --schema prisma/schema.prisma
      - run: bun run db:seed
      # Start dev server in background, wait for it, run e2e tests.
      - run: |
          bun run dev &
          DEV_PID=$!
          sleep 10
          curl -sf http://localhost:3000/api/v1/healthz || { echo "Server didn't start"; kill $DEV_PID; exit 1; }
          bash scripts/e2e-test.sh || { kill $DEV_PID; exit 1; }
          kill $DEV_PID
