name: CI

on:
  push:
    branches: [clean-rebuild, main]
  pull_request:
    branches: [clean-rebuild, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck || true  # non-blocking for now

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run db:push
        env:
          DATABASE_URL: file:./db/test.db
      - run: bun run db:seed
        env:
          DATABASE_URL: file:./db/test.db
      - run: |
          bun run dev &
          sleep 10
          bash scripts/e2e-test.sh
        env:
          DATABASE_URL: file:./db/test.db
