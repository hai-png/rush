# docker-compose for local dev / staging.
# Production deployments should NOT use these credentials — override via
# .env or a secrets manager. The previous file committed hardcoded weak
# passwords ('addisride', 'addisride123') and Redis had no password at
# all — any container on the network could read/write sessions, rate-limit
# counters, and OTP locks.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: addisride
      POSTGRES_USER: addisride
      # Read from env so production can override without editing this file.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-addisride_dev_only_change_me}
    # Don't expose DB to host in production — comment out or remove ports.
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U addisride"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Require a password — the previous config had no auth, so any container
    # on the network could read/write Redis (sessions, rate-limit counters,
    # OTP send locks, cron advisory locks).
    command: redis-server --requirepass ${REDIS_PASSWORD:-addisride_dev_only_change_me} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-addisride}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-addisride_dev_only_change_me_32chars}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    restart: unless-stopped

  web:
    build: { context: .., dockerfile: infra/Dockerfile.web }
    env_file: ../.env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_started }
    ports: ["3000:3000"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  worker:
    build: { context: .., dockerfile: infra/Dockerfile.worker }
    env_file: ../.env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    volumes:
      - "./Caddyfile:/etc/caddy/Caddyfile"
      - caddydata:/data
      - caddyconfig:/config
    ports: ["80:80", "443:443"]
    depends_on:
      web: { condition: service_started }
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  caddydata:
  caddyconfig:
